
{% extends "base.html" %}
{% block title %}Nueva Venta{% endblock %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-header">Registrar venta</div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-6">
                <label>Cliente</label>
                <select id="cliente_id" class="form-select">
                    <option value="">Seleccione un cliente</option>
                    {% for cliente in clientes %}
                    <option value="{{ cliente.id_cliente }}">{{ cliente.nombre }} ({{ cliente.cedula }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label>Medicamento</label>
                <select id="medicamento_id" class="form-select">
                    <option value="">Seleccione medicamento</option>
                    {% for med in medicamentos %}
                    <option value="{{ med.id_medicamento }}" data-precio="{{ med.precio }}" data-stock="{{ med.stock }}">{{ med.nombre }} - Stock: {{ med.stock }} - ${{ med.precio }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="mt-3">
            <button id="addItem" class="btn btn-sm btn-secondary"><i class="bi bi-plus-circle"></i> Agregar producto</button>
        </div>
        <div class="mt-3">
            <table class="table table-sm" id="itemsTable">
                <thead><tr><th>Producto</th><th>Cantidad</th><th>Precio unit.</th><th>Subtotal</th><th></th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="text-end">
            <h4>Total: $<span id="total">0.00</span></h4>
        </div>
        <button id="guardarVenta" class="btn btn-success">Registrar venta</button>
    </div>
</div>

<script>
    let items = [];
    function renderItems() {
        let tbody = document.querySelector('#itemsTable tbody');
        tbody.innerHTML = '';
        let total = 0;
        items.forEach((item, idx) => {
            let subtotal = item.cantidad * item.precio;
            total += subtotal;
            let row = tbody.insertRow();
            row.insertCell().innerText = item.nombre;
            row.insertCell().innerHTML = `<input type="number" class="form-control form-control-sm" value="${item.cantidad}" style="width:80px" onchange="updateItem(${idx}, this.value)">`;
            row.insertCell().innerText = `$${item.precio}`;
            row.insertCell().innerText = `$${subtotal.toFixed(2)}`;
            let btn = document.createElement('button');
            btn.className = 'btn btn-sm btn-danger';
            btn.innerHTML = '<i class="bi bi-trash"></i>';
            btn.onclick = () => { items.splice(idx,1); renderItems(); };
            let cell = row.insertCell();
            cell.appendChild(btn);
        });
        document.getElementById('total').innerText = total.toFixed(2);
    }
    window.updateItem = (idx, qty) => {
        items[idx].cantidad = parseInt(qty) || 1;
        renderItems();
    };
    document.getElementById('addItem').addEventListener('click', () => {
        let medSelect = document.getElementById('medicamento_id');
        let medId = medSelect.value;
        let medName = medSelect.options[medSelect.selectedIndex]?.text.split(' -')[0];
        let precio = parseFloat(medSelect.options[medSelect.selectedIndex]?.dataset.precio);
        if (!medId || isNaN(precio)) {
            alert('Seleccione un medicamento válido');
            return;
        }
        items.push({ id_medicamento: parseInt(medId), nombre: medName, precio: precio, cantidad: 1 });
        renderItems();
    });
    document.getElementById('guardarVenta').addEventListener('click', async () => {
        let clienteId = document.getElementById('cliente_id').value;
        if (!clienteId) {
            alert('Seleccione un cliente');
            return;
        }
        if (items.length === 0) {
            alert('Agregue al menos un producto');
            return;
        }
        let data = { id_cliente: parseInt(clienteId), items: items.map(i => ({ id_medicamento: i.id_medicamento, cantidad: i.cantidad })) };
        try {
            let response = await fetch('{{ url_for("farmaceutico.registrar_venta") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            let result = await response.json();
            if (response.ok && result.success) {
                alert('Venta registrada con ID ' + result.id_venta);
                window.location.href = '{{ url_for("farmaceutico.listar_ventas") }}';
            } else {
                alert('Error: ' + (result.error || 'Error desconocido'));
            }
        } catch (err) {
            alert('Error de conexión: ' + err.message);
        }
    });
</script>
{% endblock %}</script>
