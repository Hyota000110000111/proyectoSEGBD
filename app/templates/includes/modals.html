<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>Confirmar eliminación</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">¿Está seguro de eliminar <strong id="deleteName"></strong>?</div>
      <div class="modal-footer">
        <form id="deleteForm" method="POST"><input type="hidden" name="_method" value="DELETE"><button type="submit" class="btn btn-danger">Eliminar</button></form>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
      </div>
    </div>
  </div>
</div>
<script>
  const deleteModal = document.getElementById('deleteModal');
  deleteModal.addEventListener('show.bs.modal', event => {
    const button = event.relatedTarget;
    const name = button.getAttribute('data-name');
    const url = button.getAttribute('data-url');
    document.getElementById('deleteName').innerText = name;
    document.getElementById('deleteForm').action = url;
  });
</script>
