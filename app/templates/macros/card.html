{% macro stat_card(title, value, icon, color='primary', footer=None) %}
<div class="col-md-3 mb-3">
    <div class="card border-{{ color }} shadow-sm h-100">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="text-uppercase text-muted">{{ title }}</h6>
                    <h2 class="mb-0">{{ value }}</h2>
                </div>
                <div class="fs-1 text-{{ color }}"><i class="{{ icon }}"></i></div>
            </div>
            {% if footer %}<div class="mt-2 small text-muted">{{ footer }}</div>{% endif %}
        </div>
    </div>
</div>
{% endmacro %}
