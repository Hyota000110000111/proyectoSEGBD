{% extends "base.html" %}
{% block title %}Eventos de seguridad{% endblock %}
{% block content %}
<div class="card"><div class="card-header">Eventos</div><div class="card-body">
    <div class="timeline">
        {% for evento in eventos %}
        <div class="timeline-item">
            <span class="badge bg-{{ 'danger' if evento.gravedad == 'CRITICA' else 'warning' if evento.gravedad == 'ALTA' else 'info' }}">{{ evento.gravedad }}</span>
            <strong>{{ evento.fecha_hora.strftime('%Y-%m-%d %H:%M') }}</strong> - {{ evento.descripcion }}
        </div>
        {% endfor %}
    </div>
</div></div>
{% endblock %}
